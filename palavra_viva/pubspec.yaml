name: palavra_viva
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_dotenv: ^6.0.0
  flutter_local_notifications: ^18.0.1
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  font_awesome_flutter: ^11.0.0
  go_router: ^17.1.0
  google_fonts: ^8.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  lucide_icons: ^0.257.0
  share_plus: ^12.0.2
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  supabase_flutter: ^2.12.2
  timezone: ^0.9.4
  url_launcher: ^6.3.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/data/
    - assets/logo.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"

flutter_native_splash:
  color: "#04060A"
  image: "assets/logo.png"
  android_12:
    color: "#04060A"
    image: "assets/logo.png"
    icon_background_color: "#04060A"
